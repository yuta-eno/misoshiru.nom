    <style>
        /* ==============================
           Miratap風 ミニマル・モダン設定
           ============================== */
        :root { 
            --bg-color: #ffffff; 
            --main-color: #000000; /* 引き締まった黒 */
            --text-color: #333333; 
            --accent-color: #f9f9f9; /* ごく薄いグレー */
            --border-color: #e5e5e5;
            --font-main: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; 
        }
        body { font-family: var(--font-main); color: var(--text-color); background-color: var(--bg-color); margin: 0; padding: 0; line-height: 2; letter-spacing: 0.05em; padding-bottom: 80px; }
        @media (min-width: 769px) { body { padding-bottom: 0; } }
        a { text-decoration: none; color: inherit; transition: opacity 0.3s; }
        a:hover { opacity: 0.5; }
        
        /* 丸み（border-radius）や影（box-shadow）をすべて排除してシャープに */
        img { max-width: 100%; height: auto; display: block; border-radius: 0; }
        ul { list-style: none; margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 5%; }
        
        h1, h2, h3, h4 { color: var(--main-color); font-weight: 500; margin: 0; letter-spacing: 0.1em; }
        h1 { font-size: 32px; }
        /* 見出しにシャープなアンダーライン */
        h2 { font-size: 24px; border-bottom: 1px solid var(--main-color); padding-bottom: 15px; margin-bottom: 50px; display: block; text-transform: uppercase; }
        
        /* ヘッダー */
        header { background-color: var(--bg-color); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .logo { font-size: 22px; font-weight: bold; letter-spacing: 0.15em; text-transform: uppercase; }
        .nav-list { display: flex; gap: 40px; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; }
        
        main { animation: pageFadeIn 0.8s ease forwards; }
        @keyframes pageFadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        /* ヒーローセクション */
        .hero { padding: 100px 0 80px; }
        .hero-inner { display: flex; flex-direction: column; align-items: center; gap: 50px; text-align: center; }
        .hero-ill { width: 100%; max-width: 500px; background-color: #000; border-radius: 0; } 
        .hero-content h1 { line-height: 1.6; font-size: 28px; margin-bottom: 24px; }
        .hero-text { font-size: 15px; color: #666; max-width: 600px; margin: 0 auto; }
        
        /* セクション共通 */
        section { padding: 100px 0; }
        .about-flex { display: flex; align-items: stretch; gap: 60px; }
        .about-text { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .about-img { flex: 1; width: 100%; background: var(--border-color); border-radius: 0; box-shadow: none; }
        .about-img img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 組織概要 */
        .info-table { width: 100%; border-collapse: collapse; font-size: 14px; letter-spacing: 0.05em; }
        .info-table th, .info-table td { padding: 25px 20px; border-bottom: 1px solid var(--border-color); text-align: left; }
        .info-table th { width: 30%; font-weight: 500; color: #000; }

        /* お問い合わせ */
        .contact { text-align: center; padding-bottom: 100px; }
        .contact-box { background-color: var(--bg-color); border: 1px solid var(--border-color); padding: 60px; display: inline-block; width: 100%; max-width: 600px; box-sizing: border-box; border-radius: 0; }
        .contact-icon { font-size: 24px; margin-bottom: 20px; }

        /* アプリ紹介ページ専用 */
        .page-header { background-color: var(--accent-color); padding: 80px 0; text-align: center; margin-bottom: 80px; }
        .page-header h1 { font-size: 28px; }
        .app-intro { text-align: center; margin-bottom: 80px; }
        .app-title { font-size: 32px; margin-bottom: 15px; }
        .app-subtitle { font-size: 16px; color: var(--main-color); margin-bottom: 30px; letter-spacing: 0.1em; }
        .feature-block { display: flex; align-items: center; gap: 60px; margin-bottom: 80px; padding: 0; background: transparent; border: none; box-shadow: none; }
        .feature-block:nth-child(even) { flex-direction: row-reverse; }
        .feature-img { flex: 1; text-align: center; background: var(--accent-color); padding: 40px; }
        .feature-img img { margin: 0 auto; max-height: 400px; border-radius: 0; }
        .feature-text { flex: 1; }
        .feature-text h4 { font-size: 20px; margin-bottom: 24px; line-height: 1.6; border-left: 2px solid var(--main-color); padding-left: 20px; }
        .feature-list li { margin-bottom: 12px; position: relative; padding-left: 20px; color: #444; font-size: 14px; }
        .feature-list li::before { content: '-'; position: absolute; left: 0; color: var(--main-color); }

        /* フッター */
        footer { background-color: var(--main-color); color: #fff; padding: 60px 0; font-size: 12px; text-align: center; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 下部タブ（ミニマル版） */
        .bottom-nav { display: none; }
        @media (max-width: 768px) {
            .nav-list { display: none; } .header-inner { justify-content: center; }
            .bottom-nav { 
                display: flex; position: fixed; bottom: 0; left: 0; width: 100%; 
                background-color: rgba(255, 255, 255, 0.98); 
                border-top: 1px solid var(--border-color);
                z-index: 1000; padding-bottom: env(safe-area-inset-bottom); 
            }
            .bottom-tab { 
                flex: 1; text-align: center; padding: 15px 0 10px; 
                font-size: 10px; color: #999; display: flex; flex-direction: column; align-items: center; gap: 4px; 
                position: relative; -webkit-tap-highlight-color: transparent; letter-spacing: 0.1em;
            }
            .tab-icon { font-size: 22px; transition: color 0.3s; }
            .bottom-tab.active { color: var(--main-color); font-weight: 500; }
            
            /* アクティブ時は上部にシンプルな黒いラインが出るだけ */
            .bottom-tab.active::after { 
                content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
                width: 40%; height: 2px; background-color: var(--main-color); 
            }
            
            h1 { font-size: 22px; line-height: 1.5; } .hero-content h1 span { display: block; } 
            .hero-ill { max-width: 100%; border-radius: 0; }
            .about-flex { flex-direction: column; gap: 40px; } .about-text { order: 2; } .about-img { order: 1; height: 250px; }
            
            /* スマホ時の表や枠線のデザインもシャープに */
            .info-table th, .info-table td { display: block; width: 100%; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
            .info-table th { padding-bottom: 5px; border-bottom: none; color: #888; font-size: 12px; }
            .contact-box { padding: 40px 20px; border: none; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
            .feature-block, .feature-block:nth-child(even) { flex-direction: column; padding: 0; gap: 40px; }
            .feature-img { padding: 30px; width: 100%; box-sizing: border-box; }
        }
    </style>
