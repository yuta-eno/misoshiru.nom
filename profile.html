    <style>
        /* 共通CSS */
        :root { --bg-color: #ffffff; --main-color: #8c5b3e; --text-color: #333333; --accent-color: #f7f3f0; --font-main: 'Noto Sans JP', sans-serif; --font-logo: 'BIZ UDPGothic', sans-serif; }
        body { font-family: var(--font-main); color: var(--text-color); background-color: var(--bg-color); margin: 0; padding: 0; line-height: 1.8; padding-bottom: 90px; }
        @media (min-width: 769px) { body { padding-bottom: 0; } }
        a { text-decoration: none; color: inherit; transition: color 0.3s; }
        ul { list-style: none; margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        h1, h2 { color: #222; font-weight: 700; margin: 0; }
        h2 { font-size: 24px; color: var(--main-color); position: relative; display: inline-block; padding-bottom: 10px; margin-bottom: 40px; }
        h2::after { content: ''; position: absolute; left: 0; bottom: 0; width: 60px; height: 3px; background-color: var(--main-color); }
        
        header { background-color: var(--bg-color); border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 100; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; height: 80px; }
        .logo { font-family: var(--font-logo); font-size: 28px; font-weight: 700; color: var(--main-color); }
        .nav-list { display: flex; gap: 30px; font-size: 15px; }
        .nav-list a:hover { color: var(--main-color); font-weight: bold; }

        /* ページ遷移時のふわっとアニメーション */
        main { animation: pageFadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes pageFadeIn {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .page-header { background-color: var(--accent-color); padding: 60px 0; text-align: center; margin-bottom: 60px; }
        .page-header h1 { font-size: 32px; color: var(--main-color); letter-spacing: 2px; }

        section { padding: 40px 0; }
        .info-table { width: 100%; border-collapse: collapse; font-size: 15px; }
        .info-table th, .info-table td { padding: 20px; border-bottom: 1px solid #f0f0f0; text-align: left; }
        .info-table th { width: 25%; color: #555; background-color: #fafafa; }

        .contact { text-align: center; padding-bottom: 80px; }
        .contact-box { background-color: var(--accent-color); padding: 50px; border-radius: 15px; display: inline-block; }
        .contact-icon { font-size: 32px; margin-bottom: 20px; color: var(--main-color); }

        footer { background-color: #222; color: #ccc; padding: 50px 0; font-size: 14px; text-align: center; }

        /* 新・スタイリッシュ下部タブ */
        .bottom-nav { display: none; }
        @media (max-width: 768px) {
            .nav-list { display: none; } .header-inner { justify-content: center; }
            .bottom-nav { 
                display: flex; position: fixed; bottom: 0; left: 0; width: 100%; 
                background-color: rgba(255, 255, 255, 0.96); backdrop-filter: blur(15px);
                border-top: 1px solid #eaeaea; box-shadow: 0 -5px 25px rgba(0,0,0,0.08); 
                z-index: 1000; padding-bottom: env(safe-area-inset-bottom); 
            }
            .bottom-tab { 
                flex: 1; text-align: center; padding: 18px 0 14px; 
                font-size: 12px; color: #b0b0b0; display: flex; flex-direction: column; align-items: center; gap: 6px; 
                position: relative; -webkit-tap-highlight-color: transparent; 
            }
            .tab-icon { font-size: 26px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
            .bottom-tab.active { color: var(--main-color); font-weight: 700; }
            .bottom-tab.active .tab-icon { transform: translateY(-4px) scale(1.15); }
            .bottom-tab.active::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 35%; height: 3px; background-color: var(--main-color); border-radius: 0 0 3px 3px; }
            
            .info-table th, .info-table td { display: block; width: 100%; padding: 15px 10px; }
            .contact-box { width: 100%; box-sizing: border-box; padding: 30px; }
        }
    </style>
</head>
