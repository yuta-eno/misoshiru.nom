<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APPS | misoshiru.nom-project</title>
    <style>
        /* 共通設定 */
        :root { --bg-color: #ffffff; --main-color: #8c5b3e; --text-color: #333333; --accent-color: #f7f3f0; --font-main: 'Noto Sans JP', sans-serif; }
        body { font-family: var(--font-main); color: var(--text-color); background-color: var(--bg-color); margin: 0; padding: 0; line-height: 2; padding-bottom: 90px; overflow-x: hidden;}
        @media (min-width: 769px) { body { padding-bottom: 0; } }
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }
        img { max-width: 100%; height: auto; display: block; }
        ul { list-style: none; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 5%; }
        h1, h2, h3, h4 { color: #222; font-weight: 700; margin: 0; }
        
        /* ヘッダー */
        header { background-color: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 100; transition: all 0.3s; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; height: 80px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--main-color); letter-spacing: 0.05em; }
        .nav-list { display: flex; gap: 40px; font-size: 14px; letter-spacing: 0.05em; }
        .nav-item { position: relative; padding-bottom: 5px; }
        .nav-item::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: var(--main-color); transition: width 0.3s ease; }
        .nav-item:hover::after, .nav-item.active::after { width: 100%; }

        /* スクロール演出 */
        .fade-in-up { opacity: 0; transform: translateY(40px); transition: opacity 1s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .fade-in-up.is-visible { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }

        .page-header { background-color: var(--accent-color); padding: 80px 0; text-align: center; }
        .page-header h1 { font-size: 32px; color: var(--main-color); letter-spacing: 0.1em; }

        /* アプリ一覧用のカードグリッド（アプリが100個になっても綺麗に並びます） */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 80px 0; }
        
        .app-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: transform 0.3s ease, box-shadow 0.3s ease; border: 1px solid #f5f5f5; display: flex; flex-direction: column; }
        .app-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .app-card-img { width: 100%; height: 220px; background-color: #fafafa; overflow: hidden; position: relative; }
        .app-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .app-card:hover .app-card-img img { transform: scale(1.05); }
        
        .app-card-body { padding: 30px; flex: 1; display: flex; flex-direction: column; }
        .app-card-title { font-size: 22px; margin-bottom: 10px; color: #222; }
        .app-card-desc { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.6; flex: 1; }
        .app-card-link { display: inline-block; color: var(--main-color); font-weight: bold; font-size: 14px; position: relative; padding-right: 20px; align-self: flex-start; }
        .app-card-link::after { content: '→'; position: absolute; right: 0; top: 0; transition: transform 0.3s; }
        .app-card:hover .app-card-link::after { transform: translateX(5px); }

        footer { background-color: #222; color: #aaa; padding: 60px 0; font-size: 13px; text-align: center; }

        /* スマホ用下部タブ */
        .bottom-nav { display: none; }
        @media (max-width: 768px) {
            .nav-list { display: none; } .header-inner { justify-content: center; }
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-top: 1px solid #eaeaea; box-shadow: 0 -5px 25px rgba(0,0,0,0.05); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
            .bottom-tab { flex: 1; text-align: center; padding: 16px 0 12px; font-size: 11px; color: #b0b0b0; display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; -webkit-tap-highlight-color: transparent; }
            .tab-icon { font-size: 24px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
            .bottom-tab.active { color: var(--main-color); font-weight: 700; }
            .bottom-tab.active .tab-icon { transform: translateY(-3px) scale(1.1); }
            .bottom-tab.active::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 30%; height: 2px; background-color: var(--main-color); border-radius: 0 0 2px 2px; }
        }
    </style>
</head>
<body>

<header>
    <div class="container header-inner">
        <div class="logo">misoshiru.nom</div>
        <nav>
            <ul class="nav-list">
                <li><a href="index.html" class="nav-item">TOP</a></li>
                <li><a href="apps.html" class="nav-item active">APPS</a></li>
                <li><a href="profile.html" class="nav-item">PROFILE</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <div class="page-header fade-in-up">
        <div class="container">
            <h1>APPS</h1>
            <p style="color: var(--main-color); margin-top: 10px;">開発アプリケーション一覧</p>
        </div>
    </div>

    <section class="container">
        <div class="app-grid">
            
            <!-- アプリ1：簡単画面 のカード（app1.htmlに飛ぶ） -->
            <a href="app1.html" class="app-card fade-in-up">
                <div class="app-card-img">
                    <img src="app1-1.jpg" alt="簡単画面">
                </div>
                <div class="app-card-body">
                    <h3 class="app-card-title">簡単画面</h3>
                    <p class="app-card-desc">スマホをもっとやさしく、使いやすく。誤操作を防ぐゆとりのあるボタン配置が特徴のホーム画面アプリです。</p>
                    <span class="app-card-link">詳細を見る</span>
                </div>
            </a>

            <!-- アプリ2：かんたん画面2 のカード（app2.htmlに飛ぶ） -->
            <a href="app2.html" class="app-card fade-in-up delay-1">
                <div class="app-card-img">
                    <!-- 代表画像として1枚目を設定 -->
                    <img src="kantan2_01.jpg" alt="かんたん画面2">
                </div>
                <div class="app-card-body">
                    <h3 class="app-card-title">かんたん画面2</h3>
                    <p class="app-card-desc">安心と自由をさらに進化。使う方に合わせて選べる12色のカラーと、カスタマイズ性を備えた最新版です。</p>
                    <span class="app-card-link">詳細を見る</span>
                </div>
            </a>

            <!-- 今後アプリが増えたら、この下に同じ形のカードを追加していくだけです！ -->

        </div>
    </section>
</main>

<footer><div class="container"><p>&copy; 2026 misoshiru.nom-project All rights reserved.</p></div></footer>

<nav class="bottom-nav">
    <a href="index.html" class="bottom-tab"><span class="tab-icon">🏠</span><span>TOP</span></a>
    <a href="apps.html" class="bottom-tab active"><span class="tab-icon">📱</span><span>APPS</span></a>
    <a href="profile.html" class="bottom-tab"><span class="tab-icon">👤</span><span>PROFILE</span></a>
</nav>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const observerOptions = { root: null, rootMargin: '0px', threshold: 0.15 };
        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('is-visible'); observer.unobserve(entry.target); }
            });
        }, observerOptions);
        document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));
    });
</script>

</body>
</html>
